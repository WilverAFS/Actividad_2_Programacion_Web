<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Formulario Demo - Utilería JS</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main id="mainContent">
    <div class="contenedor-formulario" aria-labelledby="tituloForm">
      <h1 id="tituloForm">Formulario de Validación</h1>
      <p class="subtitulo">Demostración de la librería <strong>utileria.js</strong></p>

      <form id="formularioDemo" novalidate>
        <!-- Nombre -->
        <div class="grupo-formulario">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" autocomplete="name" />
        </div>

        <!-- Correo -->
        <div class="grupo-formulario">
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" autocomplete="email" />
        </div>

        <!-- Teléfono -->
        <div class="grupo-doble">
          <div class="grupo-formulario">
            <label for="telefono">Teléfono (10 dígitos)</label>
            <input type="text" id="telefono" name="telefono" placeholder="Ejemplo: 9511234567" inputmode="numeric" />
          </div>

          <div class="grupo-formulario">
            <label for="telefonoConfirmar">Confirmar teléfono</label>
            <input type="text" id="telefonoConfirmar" name="telefonoConfirmar" placeholder="Repite tu número" inputmode="numeric" />
          </div>
        </div>

        <!-- Fecha de nacimiento -->
        <div class="grupo-formulario">
          <label for="fechaNacimiento">Fecha de nacimiento</label>
          <input type="date" id="fechaNacimiento" name="fechaNacimiento" />
        </div>

        <!-- Contraseña -->
        <div class="grupo-doble">
          <div class="grupo-formulario">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="Contraseña segura" autocomplete="new-password" />
          </div>

          <div class="grupo-formulario">
            <label for="passwordConfirmar">Confirmar contraseña</label>
            <input type="password" id="passwordConfirmar" name="passwordConfirmar" placeholder="Repite tu contraseña" autocomplete="new-password" />
          </div>
        </div>

        <div style="margin-top:18px; display:flex; gap:12px; justify-content:center;">
          <button type="submit" class="boton-enviar">Enviar</button>
          <button type="reset" class="boton-enviar" style="background: #9aa8b0;">Limpiar</button>
        </div>

        <!-- Enlace al login agregado debajo de los botones -->
        <a class="enlace-login" href="login.html" title="Ir a la página de inicio de sesión">¿Ya tienes cuenta? Inicia sesión</a>

      </form>
    </div>
  </main>

  <!-- Modal y overlay -->
  <div id="modalOverlay" class="modal-overlay" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="modal-box" role="document" aria-labelledby="modalTitulo" aria-describedby="modalMensaje">
      <button class="modal-close" id="modalCerrar" aria-label="Cerrar ventana">✕</button>
      <h2 id="modalTitulo">Resultado</h2>
      <p id="modalMensaje" class="modal-mensaje">Tu edad es: 0 años.</p>
      <div style="margin-top:16px;">
        <button id="modalAceptar" class="boton-enviar">Aceptar</button>
      </div>
    </div>
  </div>

  <!-- Librería y script de la página -->
  <script src="js/utileria.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
